<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TalentWharf — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.011em;
    }
    .container { width: 100%; max-width: 520px; }

    /* Header */
    .header { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .header-logo { color: #FFFFFF; line-height: 0; }
    .header-sub { font-size: 13px; color: #737373; margin-top: 3px; letter-spacing: -0.006em; }

    /* Cards */
    .card {
      background: #171717;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #525252;
      margin-bottom: 18px;
    }

    /* Fields */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: #525252; }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #262626;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      letter-spacing: -0.006em;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #A3A3A3; }
    input::placeholder { color: #525252; }
    input[readonly] { opacity: 0.5; cursor: default; }

    .hint { font-size: 12px; color: #525252; line-height: 1.5; }
    .hint a { color: #A3A3A3; text-decoration: none; }
    .hint a:hover { color: #FFFFFF; }

    .key-display { display: flex; align-items: center; gap: 8px; }
    .key-display input { flex: 1; font-family: 'Courier New', monospace; font-size: 13px; }
    .btn-icon {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      color: #737373;
      border-radius: 6px;
      padding: 9px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.08); color: #fff; }

    /* Actions */
    .actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      background: #FFFFFF;
      color: #0A0A0A;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.011em;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #F5F5F5; }

    /* Toast */
    .toast {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(110, 231, 183, 0.10);
      border: 1px solid rgba(110, 231, 183, 0.25);
      color: #6ee7b7;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
    }
    .toast.show { display: flex; }

    /* Info rows */
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: #737373; }
    .info-row .value { color: #D4D4D4; font-weight: 500; font-family: 'Courier New', monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <!-- Official TalentWharf SVG wordmark -->
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 160 160"
             height="28" style="width:auto;display:block;" aria-label="TalentWharf">
          <path fill="currentColor" d="M61.37,65.52h6.16v9.81c1.58-1.65,4.12-2.89,7.39-2.89,5.27,0,8.85,3.54,8.85,9.16v11.54h-6.16v-9.74c0-3.42-1.65-5.5-4.81-5.5-3.35,0-5.27,2.04-5.27,5.54v9.7h-6.16v-27.63Z"/>
          <path fill="currentColor" d="M86.26,87.3c0-3.96,3.5-5.93,8.27-6.39l8.08-.73v-.12c0-1.54-1.31-2.77-4.58-2.77-2.77,0-4.89,1.15-5.5,2.73l-5.54-1.5c1.27-3.66,5.73-6.08,11.31-6.08,6.46,0,10.27,2.58,10.27,7.66v7.39c0,1.08.46,1.58,2.62,1.12v4.54c-4.5.85-6.97-.31-8-2.23-1.85,1.62-4.77,2.66-8.35,2.66-5,0-8.58-2.27-8.58-6.27ZM102.61,84.3l-7.2.73c-2.12.19-3.19.69-3.19,2.04s1.35,2,3.73,2c3.16,0,6.66-1.35,6.66-3.69v-1.08Z"/>
          <path fill="currentColor" d="M130.28,77.95c-3.8-.09-2.39-.08-3.7-.1-5.21-.09-7.11,2.52-7.11,7.06v8.24h-6.16v-20.28h6.16v3.5c1.77-2.58,2.92-3.51,6.23-3.51.92,0,.15-.01,4.58.01v5.08Z"/>
          <path fill="currentColor" d="M144.4,65.1c1.89,0,3.85.27,5.08.73l-.81,4.81c-1.27-.35-2.46-.54-3.89-.54-2.62,0-3.85.77-3.85,2.58v.19h7.47v5.08h-7.47v15.2h-6.08v-15.2h-4.58v-5.08h4.58v-.31c0-5.04,3.54-7.47,9.54-7.47Z"/>
          <polygon fill="currentColor" points="22.99 93.15 18.01 65.5 9.61 65.5 14.69 93.15 22.99 93.15"/>
          <polygon fill="currentColor" points="35.34 65.5 39.97 93.15 47.25 93.15 42.61 65.5 35.34 65.5"/>
          <polygon fill="currentColor" points="30.36 93.15 35.02 65.5 27.94 65.5 23.3 93.15 30.36 93.15"/>
          <polygon fill="currentColor" points="52.54 65.5 47.56 93.15 55.67 93.15 60.75 65.5 52.54 65.5"/>
        </svg>
      </div>
      <div class="header-sub">Extension Settings</div>
    </div>

    <!-- API Key -->
    <div class="card">
      <div class="card-title">API Key</div>
      <div class="field">
        <label>Your API Key</label>
        <div class="key-display">
          <input type="password" id="apiKey" placeholder="wharf_sk_..." autocomplete="off" spellcheck="false" />
          <button class="btn-icon" id="toggleKey" title="Show/hide key">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="hint">
          Generate an API key from your <a href="https://yfhwmbywrgzkdddwddtd.supabase.co" target="_blank">TalentWharf dashboard</a> under Settings → API Keys. Keys start with <code>wharf_sk_</code>.
        </span>
      </div>
    </div>

    <!-- Endpoint -->
    <div class="card">
      <div class="card-title">Edge Function URL</div>
      <div class="field">
        <label>Capture Endpoint</label>
        <input type="url" id="functionUrl" placeholder="https://...supabase.co/functions/v1/extension-capture" spellcheck="false" />
        <span class="hint">Leave as default unless you're using a custom Supabase project.</span>
      </div>
    </div>

    <!-- Project info -->
    <div class="card">
      <div class="card-title">Project Info</div>
      <div class="info-row">
        <span class="label">Project ID</span>
        <span class="value">yfhwmbywrgzkdddwddtd</span>
      </div>
      <div class="info-row">
        <span class="label">Version</span>
        <span class="value">1.0.0</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-save" id="saveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Save Settings
      </button>
    </div>

    <div class="toast" id="toast">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Settings saved
    </div>

  </div>
  <script src="options.js"></script>
</body>
</html>
