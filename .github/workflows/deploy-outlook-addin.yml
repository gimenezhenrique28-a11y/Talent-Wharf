name: Deploy Outlook Add-in to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - outlook-addin/**
  # Allow triggering manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload outlook-addin/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The contents of this folder become the root of the GitHub Pages site
          path: outlook-addin/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
